name: Integration Tests

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'  # nightly 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-tests:
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - scala-version: '2.12'
            spark-version: '3.2.0'
          - scala-version: '2.13'
            spark-version: '3.5.1'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Set JVM Options
        run: |
          echo "-Xmx2G" > .jvmopts
          echo "-Xms1G" >> .jvmopts
          echo "-Xss100m" >> .jvmopts
      - name: Tune kernel parameters for Vertica/OpenSearch
        run: sudo sysctl -w vm.max_map_count=262144
      - name: Run Integration Tests for Scala ${{ matrix.scala-version }} and Spark ${{ matrix.spark-version }}
        run: sbt -DASSY_MODE=WITHSPARK -DSCALA_VERSION=${{ matrix.scala-version }} -DSPARK_VERSION=${{ matrix.spark-version }} -Duser.timezone="Europe/Moscow" integrationTest

  integration-tests-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        scala-version: ['2.12', '2.13']
        spark-version: ['3.2.0', '3.2.4', '3.3.3', '3.4.1', '3.5.1']
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Set JVM Options
        run: |
          echo "-Xmx2G" > .jvmopts
          echo "-Xms1G" >> .jvmopts
          echo "-Xss100m" >> .jvmopts
      - name: Tune kernel parameters for Vertica/OpenSearch
        run: sudo sysctl -w vm.max_map_count=262144
      - name: Run Integration Tests for Scala ${{ matrix.scala-version }} and Spark ${{ matrix.spark-version }}
        run: sbt -DASSY_MODE=WITHSPARK -DSCALA_VERSION=${{ matrix.scala-version }} -DSPARK_VERSION=${{ matrix.spark-version }} -Duser.timezone="Europe/Moscow" integrationTest
